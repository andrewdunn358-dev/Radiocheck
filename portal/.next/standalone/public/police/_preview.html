<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>icon preview</title>
<style>
  body{margin:0;background:#0a0e14;font-family:system-ui;color:#fff;padding:30px;text-align:center}
  h1{margin:0 0 8px;font-size:22px}
  p{color:#94a3b8;font-size:13px;margin:0 0 30px}
  .row{display:flex;justify-content:center;gap:32px;align-items:flex-end;flex-wrap:wrap}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px}
  .item span{font-size:11px;color:#94a3b8}
  .light{background:#fff;padding:10px;border-radius:14px}
  .dark{background:#0f1419;padding:10px;border-radius:14px;border:1px solid #1f2937}
  img{display:block}
  .iconbig{width:140px;height:140px}
  .iconmid{width:96px;height:96px}
  .iconios{width:96px;height:96px;border-radius:22%;overflow:hidden}
</style></head><body>
<h1>Radio Check install icon &mdash; option B (logo.png) wired in</h1>
<p>Sizes shown match phone home-screen tiles.</p>
<div class="row">
  <div class="item"><div class="light"><img class="iconbig" src="/police/_preview_icon_512.png"></div><span>512px source</span></div>
  <div class="item"><div class="dark"><img class="iconmid" src="/police/_preview_icon_192.png"></div><span>Android 192 (dark)</span></div>
  <div class="item"><div class="light"><img class="iconmid" src="/police/_preview_icon_192.png"></div><span>Android 192 (light)</span></div>
  <div class="item"><div class="light"><img class="iconios" src="/police/_preview_apple_touch.png"></div><span>iOS 180 (rounded)</span></div>
</div>
</body></html>

name: Safety Tests

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'backend_test.py'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'backend_test.py'

jobs:
  safety-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run safety tests
        run: |
          cd backend
          pip install pytest pytest-asyncio
          python -m pytest tests/test_round9_items3_4_5_signals_judge.py tests/test_typographic_safety.py -v
        env:
          SKIP_LIVE_TESTS: "true"
